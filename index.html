<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SJ 활동 · 실험 보고서</title>
<style>
  :root {
    --bg: #101216;
    --panel: #171a20;
    --line: #2a2e37;
    --text: #e8eaee;
    --sub: #8b909b;
    --accent: #7dd3c8;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: "Apple SD Gothic Neo", "Malgun Gothic", "Noto Sans KR", sans-serif;
    line-height: 1.55;
  }
  .wrap { max-width: 720px; margin: 0 auto; padding: 52px 20px 80px; }

  h1 {
    font-size: 27px; font-weight: 800; letter-spacing: -0.5px;
    margin: 0 0 6px;
    color: var(--text);
  }
  h1 .sj { color: var(--accent); }
  .meta { color: var(--sub); font-size: 13px; font-weight: 600; margin: 0 0 26px; }

  /* ---------- 검색 ---------- */
  #search {
    width: 100%; font: inherit; font-weight: 600;
    padding: 11px 15px; color: var(--text);
    background: var(--panel); border: 2px solid var(--line); border-radius: 12px;
    margin-bottom: 34px; transition: border-color .15s;
  }
  #search::placeholder { color: var(--sub); }
  #search:focus { outline: none; border-color: var(--accent); }

  /* ---------- 분류 ---------- */
  .category { margin-bottom: 34px; }
  .category:last-child { margin-bottom: 0; }
  .category h2 {
    font-size: 12.5px; font-weight: 700; letter-spacing: .04em;
    color: var(--sub); margin: 0 0 14px; text-transform: uppercase;
  }

  /* ---------- 보고서 목록 ---------- */
  .list { display: flex; flex-direction: column; gap: 14px; }
  .card {
    display: flex; align-items: center; gap: 14px;
    background: var(--panel); border: 2px solid var(--line); border-radius: 14px;
    padding: 14px 18px; text-decoration: none; color: var(--text);
    transition: border-color .15s, box-shadow .15s, transform .1s;
  }
  .card:hover {
    transform: translateY(-2px);
    border-color: var(--accent);
  }
  .card:focus-visible { outline: 2px dashed var(--accent); outline-offset: 3px; }
  .card .emoji {
    flex: none; width: 42px; height: 42px; display: grid; place-items: center;
    font-size: 22px; background: #12141a;
    border: 2px solid var(--line); border-radius: 11px;
  }
  .card .txt { flex: 1; min-width: 0; }
  .card h3 { font-size: 16px; font-weight: 800; letter-spacing: -0.3px; margin: 0; }
  .card p { font-size: 13px; color: var(--sub); margin: 1px 0 0; }
  .card .go {
    flex: none; font-size: 16px; font-weight: 800; color: var(--accent);
    transition: transform .1s;
  }
  .card:hover .go { transform: translateX(4px); }

  .card.soon { pointer-events: none; opacity: .5; }
  .card.soon .go { display: none; }
  .card.soon h3::after {
    content: "준비 중"; font-size: 11px; font-weight: 700; vertical-align: 2px;
    margin-left: 8px; padding: 1px 8px; border-radius: 999px;
    border: 1px solid var(--sub); color: var(--sub);
  }

  .empty-slot {
    border: 2px dashed var(--line); border-radius: 14px;
    padding: 18px; text-align: center;
    color: var(--sub); font-size: 13px; font-weight: 600;
  }

  #empty { display: none; font-weight: 700; font-size: 14px; color: var(--sub); padding: 6px 2px; }

  footer { margin-top: 48px; font-size: 12.5px; color: var(--sub); }
  footer a { color: var(--accent); text-decoration: underline; text-underline-offset: 2px; }

  @media (prefers-reduced-motion: reduce) {
    .card, #search, .card .go { transition: none; }
  }
</style>
</head>
<body>
<div class="wrap">
  <h1><span class="sj">SJ</span> 활동/실험 보고서</h1>
  <p class="meta">2026학년도</p>

  <input id="search" type="text" placeholder="보고서 검색…" aria-label="보고서 검색">

  <main id="content"></main>
  <p id="empty">조건에 맞는 보고서가 없어요.</p>

  <footer>© 2026 SJ 문제은행 · All rights reserved.<br>문의: <a href="mailto:cepheid@kakao.com">cepheid@kakao.com</a></footer>
</div>

<script>
/* ================================================================
   보고서 목록 — 새 보고서를 추가하려면 여기에 한 항목만 붙이면 됩니다!
   1) reports/ 안에 폴더를 만들고 index.html을 넣고
   2) 아래 REPORTS 배열에 { } 항목을 추가하세요.
   category는 CATEGORIES 목록의 값과 정확히 같아야 해당 분류에 들어갑니다.
   soon: true 를 넣으면 '준비 중' 카드로 표시됩니다.
   ================================================================ */
const CATEGORIES = ['통합과학 · 과탐실', '지구과학'];

const REPORTS = [
  {
    category: '지구과학',
    name: '심층 순환의 발생 원리 추론하기',
    desc: '수온·염분 차이로 밀도류와 심층 순환이 일어나는 원리를 추론해요',
    emoji: '🌊',
    url: 'reports/deep-circulation/index.html'
  }
];

const contentEl = document.getElementById('content');
const searchEl = document.getElementById('search');
const emptyEl = document.getElementById('empty');

function cardHTML(r) {
  return `
    <a class="card${r.soon ? ' soon' : ''}" href="${r.url}" ${r.soon ? 'aria-disabled="true" tabindex="-1"' : ''}>
      <span class="emoji">${r.emoji}</span>
      <span class="txt">
        <h3>${r.name}</h3>
        <p>${r.desc}</p>
      </span>
      <span class="go">→</span>
    </a>`;
}

function render() {
  const q = searchEl.value.trim().toLowerCase();
  let shownTotal = 0;
  const sections = CATEGORIES.map(cat => {
    const all = REPORTS.filter(r => r.category === cat);
    const shown = all.filter(r => !q || (r.name + r.desc).toLowerCase().includes(q));
    if (q && shown.length === 0) return '';
    shownTotal += shown.length;
    const body = shown.length
      ? shown.map(cardHTML).join('')
      : `<div class="empty-slot">곧 추가될 실험을 위한 자리예요</div>`;
    return `
      <section class="category">
        <h2>${cat}</h2>
        <div class="list">${body}</div>
      </section>`;
  }).join('');

  contentEl.innerHTML = sections;
  emptyEl.style.display = (q && shownTotal === 0) ? 'block' : 'none';
}

searchEl.addEventListener('input', render);
render();
</script>
</body>
</html>
